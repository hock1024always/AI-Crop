version: '3.8'

services:
  # PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aicorp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aicorp123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgresql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./deploy/postgresql/memory_schema.sql:/docker-entrypoint-initdb.d/02-memory-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aicorp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # NATS 消息队列
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222", "--jetstream"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Orchestrator 总控服务
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NATS_URL=nats://nats:4222
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=aicorp123
      - DB_NAME=aicorp
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Developer Agent
  agent-dev:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGENT_ID=dev-1
      - AGENT_NAME=研发工程师-1
      - AGENT_TYPE=developer
      - ORCHESTRATOR_URL=ws://orchestrator:8080/ws
      - NATS_URL=nats://nats:4222
    depends_on:
      orchestrator:
        condition: service_healthy

  # Tester Agent
  agent-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGENT_ID=test-1
      - AGENT_NAME=测试工程师-1
      - AGENT_TYPE=tester
      - ORCHESTRATOR_URL=ws://orchestrator:8080/ws
      - NATS_URL=nats://nats:4222
    depends_on:
      orchestrator:
        condition: service_healthy

volumes:
  pgdata:

networks:
  default:
    name: ai-corp-network
